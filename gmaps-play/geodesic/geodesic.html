<!DOCTYPE html>
<html>
  <head>
    <style type="text/css">
      html, body, #map-canvas { height: 100%; margin: 0; padding: 0;}
    </style>
    <script type="text/javascript"
      src="https://maps.googleapis.com/maps/api/js">
    </script>
    <script type="text/javascript">
      function initialize() {
        var mapOptions = {
			center: { lat: 0, lng: 0},
			zoom: 3
		 
        };
        var map = new google.maps.Map(document.getElementById('map-canvas'),
            mapOptions);
			
		// Create a circle of radius 1000 km at 0,0
		var geodesicCircleOptions = {
			strokeColor: '#FF0000',
			strokeOpacity: 0.8,
			strokeWeight: 2,
			fillColor: '#FF0000',
			fillOpacity: 0.35,
			map: map,
			center: map.center,
			radius: 1000000,
			draggable: true,
			geodesic: true
		};
		// Add the circle to the map.
		geodesicCircle = new google.maps.Circle(geodesicCircleOptions);

		}
		google.maps.event.addDomListener(window, 'load', initialize);
		</script>
  </head>
  <body>
<div id="map-canvas"></div>
  </body>
</html>
