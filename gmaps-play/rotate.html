<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <title>Map Rotation</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      #map {
        height: 100%;
      }
    </style>
		
  </head>
  <body>
    <div><input type="button" value="Rotate" onclick="rotate10();"></div>
    <div id="map"></div>
		<script>
		var map;
		
		function initMap() {
			map = new google.maps.Map(document.getElementById('map'), {
			  center: {lat: 45.518, lng: -122.672},
			  zoom: 18,
			  mapTypeId: google.maps.MapTypeId.SATELLITE,
			  heading: 0
			});
		}
		
		function rotate10() {
			var heading = map.getHeading() || 0;
			map.setHeading(heading + 90);
		}
		</script>
		<script async defer
			src="https://maps.googleapis.com/maps/api/js??key=AIzaSyAZ42Ps28X2hKDEfY7ALU33ICA8hpxn8T8&callback=initMap">
		</script>
  </body>
	</html>
