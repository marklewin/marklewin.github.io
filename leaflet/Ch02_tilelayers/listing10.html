<!DOCTYPE html>
<html>
<head>
  <title>My Leaflet.js Map</title>
    <link rel="stylesheet" 
      href="http://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.3/leaflet.css" />
    <script src="http://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.3/leaflet.js">
    </script>
    <style>
      html, body, #map {
        height: 100%;
      }
    </style>
    <script type="text/javascript">    
        function init() {
            var map = L.map('map').setView([32.99, -100.24],4);
            var mapLink = "Esri";
            var sourcesLink ="Contributors";
            // Esri World Imagery Service
            L.tileLayer(
                    'http://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    attribution: '&copy; ' + mapLink + ', ' + sourcesLink,
                    maxZoom: 18,
            }).addTo(map);
            // US States WMS Layer
            L.tileLayer.wms("http://demo.opengeo.org/geoserver/wms", {
                    layers: 'topp:states',
                    format: 'image/png',
                    transparent: true,
                    attribution: "<a href='http://www.boundlessgeo.com'>OpenGeo</a>"
            }).addTo(map);
        }		
    </script>
</head>
<body onload=init()>
	<div id="map"></div>
</body>
</html>
