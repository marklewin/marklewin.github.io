<!DOCTYPE html>
<html>
<head>
  <title>My Leaflet.js Map</title>
    <link rel="stylesheet" 
      href="http://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.3/leaflet.css" />
    <script src="http://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.3/leaflet.js">
    </script>
    <style>
      html, body, #map {
        height: 100%;
      }
    </style>
    <script type="text/javascript">
        function init() {
            var map = L.map('map').setView([51.76, -1.26],16);;

            // OSM Mapnik
            var osmLink = "<a href='http://www.openstreetmap.org'>Open StreetMap</a>";   
            var osm = L.tileLayer(
                'http://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; ' + osmLink,
                maxZoom: 18,
            }).addTo(map);

            var multipolygon = L.multiPolygon([
                [
                    [51.756633, -1.258688],
                    [51.756416, -1.258618],
                    [51.756454, -1.258323],
                    [51.756592, -1.258371],
                    [51.756584, -1.258443],
                    [51.756663, -1.258473]
                ],
                [
                    [51.756578, -1.259225],
                    [51.756601, -1.259026],
                    [51.756342, -1.258940],
                    [51.756313, -1.259144] 
                ]
            ], {
                color: "blue",
                weight: 5,
                fillColor: "red",
                fillOpacity: 0.5
            }).bindPopup("This is a multipolygon").addTo(map);

            var baseLayers = {
                "OpenStreetMap": osm
            };

            var overlays = {
                "University Buildings": multipolygon,
            };

            L.control.layers(baseLayers, overlays).addTo(map);

        }			
    </script>
</head>
<body onload=init()>
	<div id="map"></div>
</body>
</html>
